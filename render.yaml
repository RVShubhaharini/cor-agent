services:
  # 1. Backend REST API Service
  - type: web
    name: cro-agent-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        value: placeholder_enter_groq_key_here
      - key: SUPABASE_URL
        value: placeholder_enter_supabase_url_here
      - key: SUPABASE_KEY
        value: placeholder_enter_supabase_key_here

  # 2. Frontend Static Site Service
  - type: web
    name: cro-agent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: placeholder_enter_backend_url_here
